<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    
    <div class="flex items-center justify-center h-screen bg-gray-100">

  <div class="bg-white p-8 rounded shadow-md w-80 text-center">

    <h1 class="text-2xl font-bold mb-2">PHI Lab</h1>
    <p class="text-gray-500 mb-6">Issue Tracker System</p>

    <input id="username" type="text" placeholder="Username"
      class="border w-full mb-3 p-2 rounded">

    <input id="password" type="password" placeholder="Password"
      class="border w-full mb-4 p-2 rounded">

    <button onclick="login()"
      class="bg-blue-500 text-white w-full py-2 rounded">
      Sign In
    </button>

    <p class="text-sm mt-3 text-gray-400">
      Demo: admin / admin123
    </p>

  </div>

</div>

    <script src="./script/index.js"></script>
</body>
</html>
