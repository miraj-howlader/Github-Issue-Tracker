<!DOCTYPE html>
<html lang="en">
<head>

     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <p class="text-gray-500 mb-6">Issue Tracker System</p>
     
    <p class="text-start ">UserName</p>

      class="border w-full mb-4 p-2 rounded mt-2">
      
      <p class="text-start text-blue-500 mb-2 ">Default admin123</p>
    <button onclick="login()"
      class="bg-blue-500 text-white w-full py-2 rounded">

    </button>

      Demo: admin / admin123

</div>
